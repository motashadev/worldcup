<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مونديال 2026 | القائمة الرئيسية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a0e17 0%, #8a1538 50%, #2f070c 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        .main-menu {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            font-size: 38px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 16px;
            color: #f0d5dc;
            margin-bottom: 40px;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.95);
            color: #8a1538;
            padding: 18px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .menu-card:hover {
            transform: translateY(-4px);
            background: #8a1538;
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
        }

        .icon {
            font-size: 22px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-menu">
        <h1>🏆 صافرة 2026</h1>
        <p>كل المباريات بمكان واحد</p>

        <div class="menu-links">
            <a href="groups.html" class="menu-card">
                <span>🗂️ الترتيب حسب المجموعات</span>
            </a>
            
            <a href="time.html" class="menu-card">
                <span>📅 الترتيب حسب الوقت والتاريخ</span>
            </a>
        </div>
    </div>

</body>
</html>
